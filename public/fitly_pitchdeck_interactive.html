<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Fitly Interactive Pitch Deck</title><style>
:root{--bg:#05060a;--surface:#0d1017;--ink:#f4f4f5;--muted:#8b8d98;--accent:#18d39b;--line:#262a34}*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--ink);font-family:Inter,ui-sans-serif,system-ui,-apple-system,Segoe UI,sans-serif;overflow:hidden}button,a{font:inherit}.top{position:absolute;z-index:20;left:24px;right:24px;top:24px;display:flex;justify-content:space-between;align-items:center}.brand{display:flex;align-items:center;gap:9px;font-weight:950;color:var(--ink);text-decoration:none}.brand svg{color:var(--accent)}.topRight{display:flex;align-items:center;gap:12px;color:var(--muted);font-size:12px;font-weight:950;text-transform:uppercase;letter-spacing:.18em}.download{display:inline-flex;align-items:center;gap:8px;border:1px solid var(--line);border-radius:999px;padding:9px 14px;color:var(--ink);text-decoration:none}.download:hover{border-color:var(--accent)}.stage{min-height:100vh;display:grid;place-items:center;padding:96px 24px}.slide{width:100%;max-width:1150px;text-align:center;animation:fade .3s ease-out}.eyebrow{margin-bottom:30px;color:var(--muted);font-size:12px;font-weight:950;text-transform:uppercase;letter-spacing:.24em}.title{margin:0 auto;max-width:980px;font-size:84px;line-height:.95;letter-spacing:-.04em;font-weight:950}.accent{color:var(--accent)}.line{margin:28px auto 0;max-width:680px;color:var(--muted);font-size:20px;line-height:1.55;font-weight:650}.visual{margin-top:48px}.panel{border:1px solid var(--line);background:var(--surface);padding:22px}.cover{position:relative;margin:auto;aspect-ratio:1.55;width:min(760px,100%);overflow:hidden;border:1px solid var(--line);background:var(--surface)}.cover:before{content:"";position:absolute;inset:0;opacity:.35;background-image:linear-gradient(90deg,var(--line) 1px,transparent 1px),linear-gradient(180deg,var(--line) 1px,transparent 1px);background-size:46px 46px}.coverBrand{position:absolute;left:30px;top:26px;font-weight:950}.coverCards{position:absolute;left:28px;right:28px;bottom:28px;display:grid;grid-template-columns:repeat(3,1fr);gap:12px}.coverCards div{border:1px solid var(--line);background:rgba(5,6,10,.72);padding:15px;text-align:left}.coverCards b{color:var(--accent);font-size:32px}.small{display:block;margin-top:4px;color:var(--muted);font-size:11px;font-weight:950;text-transform:uppercase;letter-spacing:.18em}.stats,.grid2,.grid3,.grid4,.grid5{display:grid;gap:12px;margin:auto}.stats,.grid3{grid-template-columns:repeat(3,1fr);max-width:860px}.grid2{grid-template-columns:repeat(2,1fr);max-width:760px}.grid4{grid-template-columns:repeat(4,1fr);max-width:960px}.grid5{grid-template-columns:repeat(5,1fr);max-width:980px}.stat,.card,.cell{border:1px solid var(--line);background:var(--surface);padding:20px;text-align:left;color:var(--ink);cursor:pointer;transition:.18s}.stat:hover,.card:hover,.cell:hover{transform:translateY(-4px);border-color:var(--accent)}.active{border-color:var(--accent)!important;background:rgba(24,211,155,.08)!important}.stat b{display:block;font-size:44px}.wide{grid-column:1/-1;text-align:center;font-weight:850}.cell{min-height:140px;display:flex;flex-direction:column;justify-content:flex-end}.cell b,.card b{font-size:24px}.num{color:var(--accent);font-size:30px;font-weight:950;margin-bottom:40px}.product{max-width:960px;margin:auto;border:1px solid var(--line);background:var(--surface);padding:18px}.productTop{display:flex;justify-content:space-between;border-bottom:1px solid var(--line);padding-bottom:13px;color:var(--muted);font-size:11px;font-weight:950;text-transform:uppercase;letter-spacing:.18em}.productBody{display:grid;grid-template-columns:.82fr 1.18fr;gap:18px;padding-top:18px;text-align:left}.shoe{aspect-ratio:1;background:#05060a;margin-bottom:14px}.fitbox{border:2px solid var(--accent);background:#05060a;padding:20px}.alts{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:16px}.alt{border:1px solid var(--line);background:transparent;color:var(--ink);padding:12px;text-align:left;cursor:pointer}.alt.active{border-color:var(--accent);background:rgba(24,211,155,.08)}.qr{display:grid;place-items:center;height:180px;width:180px;margin:auto;border:12px solid var(--accent);font-size:76px;color:var(--accent)}.done{display:flex;align-items:center;gap:12px;border:1px solid var(--line);background:var(--surface);padding:15px;font-weight:950;text-align:left}.check{display:grid;place-items:center;width:32px;height:32px;border-radius:999px;background:var(--accent);color:#05060a}.bottom{position:absolute;z-index:20;left:24px;right:24px;bottom:26px;display:flex;align-items:center;justify-content:space-between}.nav{display:grid;place-items:center;width:44px;height:44px;border:1px solid var(--line);border-radius:999px;background:transparent;color:var(--muted);cursor:pointer}.nav:hover{border-color:var(--accent);color:var(--ink)}.center{display:flex;flex-direction:column;align-items:center;gap:8px;color:var(--muted);font-size:12px}.dots{display:flex;gap:8px}.dot{height:6px;width:16px;border:0;border-radius:999px;background:var(--line);cursor:pointer}.dot.active{width:40px;background:var(--accent)}.overall{height:1px;width:min(320px,55vw);background:var(--line)}.overall span,.slidebar span{display:block;height:100%;background:var(--accent)}.slidebar{position:absolute;left:0;right:0;bottom:0;height:2px;background:var(--line)}@keyframes fade{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}@media(max-width:900px){.title{font-size:48px}.line{font-size:17px}.stage{padding:86px 18px}.stats,.grid2,.grid3,.grid4,.grid5,.productBody{grid-template-columns:1fr}.visual{margin-top:34px}.topRight .download{display:none}.bottom{bottom:18px}.coverCards{grid-template-columns:1fr}.cover{aspect-ratio:auto;min-height:430px}}
</style></head><body><header class="top"><a class="brand" href="#"><span style="color:var(--accent)">⌁</span> Fitly</a><div class="topRight"><span id="time">3:00</span><a class="download" href="fitly_pitchdeck_interactive.html" download>Download</a></div></header><main class="stage"><section id="slide" class="slide"></section></main><nav class="bottom"><button class="nav" onclick="prev()">‹</button><div class="center"><span id="count">1 / 10</span><div id="dots" class="dots"></div><div class="overall"><span id="overall"></span></div></div><div style="display:flex;gap:8px"><button id="play" class="nav" onclick="toggle()">▶</button><button class="nav" onclick="full()">⛶</button><button class="nav" onclick="next()">›</button></div></nav><div class="slidebar"><span id="slidebar"></span></div><script>
const slides=[
{eyebrow:'Pre-seed · 2026',title:'We make shoe returns',accent:'disappear.',line:'AI foot scanning meets real shoe interior data.',note:'Fitly removes fit uncertainty before checkout.',kind:'cover'},
{eyebrow:'01 · Pain',title:'Online shoe shopping is',accent:'broken.',line:'Returns are not a logistics problem. They start with doubt.',note:'Bracketing destroys retailer margin.',kind:'problem'},
{eyebrow:'02 · Gap',title:'The market solved',accent:'half.',line:'Foot-only tools guess. Store scanners are offline. The online dual-data quadrant is open.',note:'Foot data + shoe data + online timing.',kind:'gap'},
{eyebrow:'03 · Mechanic',title:'Scan once. Match',accent:'every model.',line:'Length chooses size. Geometry decides fit.',note:'Make the equation feel obvious.',kind:'equation'},
{eyebrow:'04 · Product',title:'A widget, not',accent:'another app.',line:'Fit score, alternatives and FitChat directly inside the product page.',note:'This mirrors our website demo.',kind:'widget'},
{eyebrow:'05 · Live MVP',title:'The loop works',accent:'today.',line:'QR handoff → scan result → 3D fit → better alternatives.',note:'This is now a product loop, not just slides.',kind:'mvp'},
{eyebrow:'06 · Built today',title:'Demo blockers',accent:'removed.',line:'Return sync, shoe switching, grounded chat and meaningful score spread.',note:'Show progress from today in Lovable.',kind:'progress'},
{eyebrow:'07 · Start',title:'Running shoes',accent:'first.',line:'High pain. Fit-aware customers. Measurable return reduction.',note:'One category, one KPI.',kind:'gtm'},
{eyebrow:'08 · 10 weeks',title:'One paid',accent:'pilot.',line:'10 discovery calls. 1 retailer. A/B return-rate proof.',note:'The next milestone is commercial proof.',kind:'pilot'},
{eyebrow:'09 · Ask',title:'Help us reach',accent:'the pilot.',line:'Retail intros, shoe-data partners and CV/ML expertise.',note:'End concrete and ask for help.',kind:'ask'}];
let i=0,elapsed=0,playing=false,timer=null,metric=0,quad=1,step=0,shoe=3,stage=0;const T=180,S=18;const alts=[['Vaporfly 4',57,'too narrow'],['Ghost Max 3',72,'okay'],['Bondi 8',91,'better'],['990v6',95,'best']];
function clock(s){return Math.floor(s/60)+':'+String(s%60).padStart(2,'0')}function stat(v,l,k){return `<button onclick="metric=${k};render()" class="stat ${metric===k?'active':''}"><b>${v}</b><span class="small">${l}</span></button>`}function renderVisual(k){if(k==='cover')return `<div class="cover"><div class="coverBrand">Fitly</div><div class="coverCards"><div><b>01</b><span class="small">foot</span></div><div><b>02</b><span class="small">shoe</span></div><div><b>03</b><span class="small">match</span></div></div></div>`;if(k==='problem')return `<div class="stats">${stat('30–40%','return rate',0)}${stat('€10–40','cost / return',1)}${stat('#1','wrong fit',2)}<div class="panel wide">${['30–40% of online shoe orders come back.','Each return burns reverse logistics and margin.','Wrong fit triggers bracketing behavior.'][metric]}</div></div>`;if(k==='gap'){let c=[['TrueFit','online guessing'],['Fitly','online + shoe data'],['Size charts','static'],['SafeSize','offline precision']];return `<div class="grid2">${c.map((x,n)=>`<button onclick="quad=${n};render()" class="cell ${quad===n?'active':''}"><b>${x[0]}</b><span class="small">${x[1]}</span></button>`).join('')}</div>`}if(k==='equation'){let c=['scan','foot','shoe','match'];return `<div><div class="grid4">${c.map((x,n)=>`<button onclick="step=${n};render()" class="card ${step===n?'active':''}"><div class="num">0${n+1}</div><b>${x}</b></button>`).join('')}</div><div class="panel" style="max-width:960px;margin:14px auto 0;font-weight:850">${['No app. The phone is the scanner.','Width, heel, toe box and drop drive comfort.','Each model has different interior geometry.','One clear next action at checkout.'][step]}</div></div>`}if(k==='widget'){let a=alts[shoe];return `<div class="product"><div class="productTop"><span>Keller Sports</span><span>Product page</span></div><div class="productBody"><div><div class="shoe"></div><span class="small">Nike</span><h2>Vaporfly 4</h2></div><div class="fitbox"><span class="small">powered by Fitly</span><h2>Fit score: ${a[1]}%</h2><p style="color:var(--muted);font-weight:750">Click shoes to change recommendation.</p><div class="alts">${alts.map((x,n)=>`<button onclick="shoe=${n};render()" class="alt ${shoe===n?'active':''}"><b>${x[1]}%</b><br>${x[0]} · ${x[2]}</button>`).join('')}</div></div></div></div>`}if(k==='mvp')return `<div class="grid2"><div class="panel"><div class="qr">▦</div></div><div>${['QR handoff fixed','Scan result syncs','3D fit renders','Alternatives ranked'].map(x=>`<div class="done"><span class="check">✓</span>${x}</div>`).join('')}</div></div>`;if(k==='progress')return `<div class="grid5">${['QR return','shoe sync','grounded chat','score spread','build green'].map((x,n)=>`<div class="card"><div class="num">0${n+1}</div><b>${x}</b></div>`).join('')}</div>`;if(k==='gtm'){let s=[['Now','Running shoes'],['Next','Retailer pilots'],['Later','Marketplace API']];return `<div><div class="grid3">${s.map((x,n)=>`<button onclick="stage=${n};render()" class="card ${stage===n?'active':''}"><span class="small" style="color:var(--accent)">${x[0]}</span><b>${x[1]}</b></button>`).join('')}</div><div class="panel" style="max-width:860px;margin:14px auto 0;font-weight:950">KPI: return rate before vs. after Fitly.</div></div>`}if(k==='pilot')return `<div class="grid2">${[['10','discovery calls'],['1','paid pilot'],['A/B','return proof'],['10w','timeline']].map(x=>`<div class="stat"><b>${x[0]}</b><span class="small">${x[1]}</span></div>`).join('')}</div>`;return `<div class="grid2"><div class="panel active"><h2 style="font-size:72px;margin:30px 0">PILOT</h2></div><div>${['Retail intros','Shoe data partners','CV / ML expertise'].map(x=>`<div class="done"><span class="check">✓</span>${x}</div>`).join('')}</div></div>`}
function render(){let s=slides[i];slide.innerHTML=`<div class="eyebrow">${s.eyebrow}</div><h1 class="title">${s.title} <span class="accent">${s.accent}</span></h1><p class="line">${s.line}</p><div class="visual">${renderVisual(s.kind)}</div>`;time.textContent=clock(Math.max(0,T-elapsed));count.textContent=(i+1)+' / '+slides.length;overall.style.width=Math.min(100,elapsed/T*100)+'%';slidebar.style.width=((elapsed%S)/S*100)+'%';play.textContent=playing?'⏸':'▶';dots.innerHTML=slides.map((_,n)=>`<button onclick="go(${n})" class="dot ${n===i?'active':''}"></button>`).join('')}function go(n){i=Math.max(0,Math.min(slides.length-1,n));elapsed=i*S;render()}function next(){go(i+1)}function prev(){go(i-1)}function toggle(){playing=!playing;if(playing){timer=setInterval(()=>{elapsed=Math.min(T,elapsed+1);i=Math.min(slides.length-1,Math.floor(elapsed/S));if(elapsed>=T){playing=false;clearInterval(timer)}render()},1000)}else clearInterval(timer);render()}function full(){document.documentElement.requestFullscreen&&document.documentElement.requestFullscreen()}document.addEventListener('keydown',e=>{if(e.key==='ArrowRight'||e.key===' ')next();if(e.key==='ArrowLeft')prev();if(e.key.toLowerCase()==='p')toggle();if(e.key.toLowerCase()==='f')full()});render();
</script></body></html>
